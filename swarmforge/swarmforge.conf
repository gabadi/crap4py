# Format: window <role> <agent> <worktree> [task|batch]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
window specifier   claude specifier   task  --model=claude-opus-4-8   --effort=high
window coder       claude coder       task  --model=claude-sonnet-4-6 --effort=medium
window ux-engineer claude ux-engineer task  --model=claude-sonnet-4-6 --effort=medium
window cleaner     claude cleaner     task  --model=claude-sonnet-4-6 --effort=medium
window architect   claude architect   task  --model=claude-sonnet-4-6 --effort=high
window hardender   claude hardender   task  --model=claude-sonnet-4-6 --effort=medium
window QA          claude QA          task  --model=claude-sonnet-4-6 --effort=medium
window integrator  claude integrator  task  --model=claude-sonnet-4-6 --effort=low
window curator     claude curator     task  --model=claude-sonnet-4-6 --effort=medium
