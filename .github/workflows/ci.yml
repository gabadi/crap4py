name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format check
        run: uv run ruff format --check src/ tests/
      - name: Tests
        run: uv run pytest --cov --cov-report=lcov:lcov.info --cov-report=term-missing --cov-fail-under=90
      - name: Coverage report
        uses: zgosalvez/github-actions-report-lcov@84f16a83ae03e846a4c697bd75cae3f94fa9f426 # v7.0.12
        if: always()
        with:
          coverage-files: lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: CRAP
        run: uv run crap4py src/ --lcov lcov.info --max-crap 6
      - name: Install drywall
        run: |
          gh release download --repo gabadi/drywall --pattern 'drywall-linux-x86_64' --output drywall
          chmod +x drywall
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: DRY
        run: ./drywall src/
